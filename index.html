<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom Pro Notes - V7</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json?v=3">
    <meta name="theme-color" content="#1a73e8">
    <style>
        :root {
            --bg-main: #ffffff; --bg-sidebar: #f1f3f4; --text: #202124;
            --accent: #1a73e8; --border: #dadce0; --hover: #e8eaed;
            --sidebar-width: 280px;
        }
        body.dark-mode {
            --bg-main: #1e1e1e; --bg-sidebar: #2d2d2d; --text: #e0e0e0;
            --accent: #3794ff; --border: #444; --hover: #3d3d3d;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background: var(--bg-main); color: var(--text); overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width); background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: margin-left 0.3s ease;
            z-index: 100; flex-shrink: 0;
        }
        .sidebar.hidden { margin-left: calc(var(--sidebar-width) * -1); }

        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); }
        .tree-container { flex-grow: 1; overflow-y: auto; padding: 10px; }

        .folder-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 8px; border-radius: 4px; cursor: pointer; margin-top: 5px;
            background: rgba(0,0,0,0.03);
        }
        body.dark-mode .folder-row { background: rgba(255,255,255,0.03); }
        .folder-row:hover { background: var(--hover); }
        
        .folder-label { font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .folder-toggle { cursor: pointer; padding: 2px 5px; transition: transform 0.2s; font-size: 10px; }
        .collapsed .folder-toggle { transform: rotate(-90deg); }

        .folder-controls { display: flex; gap: 2px; }

        /* Lista de Notas */
        .note-container { margin-left: 15px; border-left: 1px solid var(--border); }
        .note-container.hidden { display: none; }

        .note-item { 
            padding: 6px 10px; cursor: pointer; border-radius: 4px; 
            display: flex; align-items: center; justify-content: space-between; margin: 2px 0 2px 10px;
            font-size: 12px;
        }
        .note-item:hover { background: var(--hover); }
        .note-item.active { background: var(--accent); color: white; border-left-color: transparent; }

        .note-controls { display: flex; gap: 2px; opacity: 0; }
        .note-item:hover .note-controls { opacity: 0.8; }
        .note-item.active .note-controls { opacity: 1; }

        /* Main Content */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        
        .toolbar {
            padding: 8px 15px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px; background: var(--bg-sidebar); flex-wrap: wrap;
        }

        #editor {
            flex-grow: 1; padding: 25px; outline: none; overflow-y: auto;
            line-height: 1.6; font-size: 14px; background: var(--bg-main);
        }

        .toggle-sidebar { cursor: pointer; font-size: 20px; border: none; background: none; color: var(--text); padding: 5px; border-radius: 4px; }
        .toggle-sidebar:hover { background: var(--hover); }
        
        /* Floating "Notas" Menu */
        .floating-container { 
            position: absolute; 
            right: 25px; 
            bottom: 25px; 
            z-index: 200; 
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .floating-btn {
            background: var(--accent); color: white; border: none; padding: 12px 20px;
            border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            font-weight: bold; display: none; font-size: 14px;
        }
        .sidebar.hidden ~ .main-content .floating-btn { display: block; }

        .floating-tree {
            margin-bottom: 10px; width: 260px;
            background: var(--bg-sidebar); border: 1px solid var(--border);
            border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            max-height: 60vh; overflow-y: auto; display: none; padding: 12px;
        }
        .floating-tree.show { display: block; }

        .format-btn { padding: 4px 8px; font-size: 11px; border: 1px solid var(--border); border-radius: 3px; background: var(--bg-main); color: var(--text); cursor: pointer; }
        .format-btn:hover { background: var(--hover); }
        .format-btn.active-tool { background: var(--accent) !important; color: white !important; border-color: transparent; }
        
        .btn-icon { background: none; border: none; cursor: pointer; opacity: 0.6; font-size: 12px; padding: 2px 4px; color: var(--text); }
        .btn-icon:hover { opacity: 1; scale: 1.2; }

        #editor h2 { color: var(--accent); border-bottom: 1px solid var(--border); margin-top: 0; }
        #editor:empty:before { content: attr(placeholder); color: gray; }

        .color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.1); margin-right: 2px; }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <input type="text" id="search" placeholder="Procurar..." oninput="render()" style="width:100%; padding:8px; border-radius:4px; border:1px solid var(--border); background: var(--bg-main); color: var(--text);">
        <div style="margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button onclick="addFolder()" class="format-btn">+ Pasta</button>
            <button onclick="addNote()" class="format-btn" style="background: var(--accent); color:white;">+ Nota</button>
        </div>
    </div>
    <div class="tree-container" id="tree"></div>
    <div style="padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px;">
        <button onclick="exportData()" class="format-btn">💾 Guardar em Ficheiro</button>
        <button onclick="document.getElementById('importFile').click()" class="format-btn">📂 Carregar Ficheiro</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(this)">
    </div>
</aside>

<main class="main-content">
    <div class="toolbar">
        <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
        <div class="format-tools" style="display: flex; gap: 4px; flex-wrap: wrap;">
            <button id="btn-H2" class="format-btn" onclick="execCmd('formatBlock', 'H2')">Título</button>
            <button id="btn-bold" class="format-btn" onclick="execCmd('bold')"><b>B</b></button>
            
            <button class="format-btn" onclick="execCmd('foreColor', '#1a73e8')" title="Azul"><span class="color-dot" style="background:#1a73e8"></span></button>
            <button class="format-btn" onclick="execCmd('foreColor', '#4285f4')" title="Azul Claro"><span class="color-dot" style="background:#4285f4"></span></button>
            <button class="format-btn" onclick="execCmd('foreColor', '#d93025')" title="Vermelho"><span class="color-dot" style="background:#d93025"></span></button>
            <button class="format-btn" onclick="execCmd('foreColor', '#f9ab00')" title="Amarelo"><span class="color-dot" style="background:#f9ab00"></span></button>
            <button class="format-btn" onclick="execCmd('foreColor', '#e67c73')" title="Laranja"><span class="color-dot" style="background:#e67c73"></span></button>

            <button class="format-btn" onclick="execCmd('hiliteColor', '#fff475')" title="Realce Amarelo">🖍️</button>
            <button class="format-btn" onclick="execCmd('hiliteColor', '#aecbfa')" title="Realce Azul">🖍️</button>

            <button id="btn-list" class="format-btn" onclick="execCmd('insertUnorderedList')">• Lista</button>
            <button class="format-btn" onclick="execCmd('removeFormat')">Limpar</button>
        </div>
        <div style="margin-left: auto; display:flex; gap:5px;">
            <button class="format-btn" onclick="toggleTheme()" title="Modo Claro/Escuro">🌓</button>
        </div>
    </div>

    <div class="floating-container">
        <div class="floating-tree" id="floatingTree"></div>
        <button class="floating-btn" id="floatBtn" onclick="toggleFloatingTree()">Notas ▾</button>
    </div>

    <div id="editor" contenteditable="true" oninput="saveCurrentNote()" placeholder="Escreve as tuas notas aqui..."></div>
</main>

<script>
    let data = JSON.parse(localStorage.getItem('telecom_v7')) || {
        folders: [{ name: 'Geral', notes: [{ id: 1, title: 'Nota Inicial', content: '<h2>BO</h2>' }], collapsed: false }],
        dark: true, activeNoteId: 1
    };
    let activeFolderIndex = 0;

    const editorEl = document.getElementById('editor');

    // CORREÇÃO: Limpa a entrada (PASTE) para evitar lixo HTML
    editorEl.addEventListener('paste', function(e) {
        e.preventDefault();
        const text = (e.originalEvent || e).clipboardData.getData('text/plain');
        const cleanHTML = text.replace(/\n/g, '<br>');
        document.execCommand('insertHTML', false, cleanHTML);
        saveCurrentNote();
    });

    // CORREÇÃO: Limpa a saída (COPY) para que o Excel receba apenas Texto Puro
    editorEl.addEventListener('copy', function(e) {
        const selection = window.getSelection().toString();
        e.clipboardData.setData('text/plain', selection);
        e.preventDefault(); 
    });

    function updateToolbars() {
        document.getElementById('btn-bold').classList.toggle('active-tool', document.queryCommandState('bold'));
        document.getElementById('btn-list').classList.toggle('active-tool', document.queryCommandState('insertUnorderedList'));
        const block = document.queryCommandValue('formatBlock');
        const h2Btn = document.getElementById('btn-H2');
        if(h2Btn) h2Btn.classList.toggle('active-tool', block === 'h2');
    }

    function execCmd(cmd, val = null) {
        document.execCommand(cmd, false, val);
        editorEl.focus();
        updateToolbars();
        saveCurrentNote();
    }
    
    function toggleSidebar() { 
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('hidden');
        if(!sb.classList.contains('hidden')) document.getElementById('floatingTree').classList.remove('show');
    }

    function toggleFloatingTree() { 
        const ft = document.getElementById('floatingTree');
        ft.classList.toggle('show');
        if(ft.classList.contains('show')) render();
    }

    function toggleTheme() { data.dark = !data.dark; render(); }

    function toggleFolder(idx) {
        data.folders[idx].collapsed = !data.folders[idx].collapsed;
        render();
    }

    function render() {
        document.body.className = data.dark ? 'dark-mode' : '';
        const query = document.getElementById('search').value.toLowerCase();
        const containers = [document.getElementById('tree'), document.getElementById('floatingTree')];
        
        containers.forEach(container => {
            if(!container) return;
            container.innerHTML = '';
            data.folders.forEach((folder, fIdx) => {
                const group = document.createElement('div');
                
                const row = document.createElement('div');
                row.className = `folder-row ${folder.collapsed ? 'collapsed' : ''}`;
                if(fIdx === activeFolderIndex) row.style.borderLeft = '3px solid var(--accent)';
                
                row.innerHTML = `
                    <span class="folder-label" onclick="activeFolderIndex = ${fIdx}; render()">
                        <span class="folder-toggle" onclick="event.stopPropagation(); toggleFolder(${fIdx})">▼</span>
                        📁 ${folder.name}
                    </span>
                    <div class="folder-controls">
                        <button class="btn-icon" onclick="moveFolder(event, ${fIdx}, -1)">↑</button>
                        <button class="btn-icon" onclick="moveFolder(event, ${fIdx}, 1)">↓</button>
                        <button class="btn-icon" onclick="deleteFolder(event, ${fIdx})">🗑️</button>
                    </div>
                `;
                group.appendChild(row);

                const noteContainer = document.createElement('div');
                noteContainer.className = `note-container ${folder.collapsed ? 'hidden' : ''}`;

                folder.notes.forEach((note, nIdx) => {
                    if(note.title.toLowerCase().includes(query)) {
                        const nDiv = document.createElement('div');
                        nDiv.className = `note-item ${note.id === data.activeNoteId ? 'active' : ''}`;
                        nDiv.innerHTML = `
                            <span style="flex-grow:1" onclick="loadNote(${note.id})">📄 ${note.title}</span>
                            <div class="note-controls">
                                <button class="btn-icon" style="color:inherit" onclick="event.stopPropagation(); moveNote(${fIdx}, ${nIdx}, -1)">↑</button>
                                <button class="btn-icon" style="color:inherit" onclick="event.stopPropagation(); moveNote(${fIdx}, ${nIdx}, 1)">↓</button>
                                <button class="btn-icon" style="color:inherit" onclick="event.stopPropagation(); deleteNote(${fIdx}, ${nIdx})">×</button>
                            </div>
                        `;
                        noteContainer.appendChild(nDiv);
                    }
                });
                group.appendChild(noteContainer);
                container.appendChild(group);
            });
        });
        save();
    }

    function moveNote(fIdx, nIdx, direction) {
        const notes = data.folders[fIdx].notes;
        const newIndex = nIdx + direction;
        if (newIndex >= 0 && newIndex < notes.length) {
            [notes[nIdx], notes[newIndex]] = [notes[newIndex], notes[nIdx]];
            render();
        }
    }

    function deleteNote(fIdx, nIdx) {
        if(confirm(`Apagar a nota "${data.folders[fIdx].notes[nIdx].title}"?`)) {
            data.folders[fIdx].notes.splice(nIdx, 1);
            render();
        }
    }

    function moveFolder(e, index, direction) {
        e.stopPropagation();
        const newIndex = index + direction;
        if (newIndex >= 0 && newIndex < data.folders.length) {
            [data.folders[index], data.folders[newIndex]] = [data.folders[newIndex], data.folders[index]];
            activeFolderIndex = newIndex;
            render();
        }
    }

    function loadNote(id) {
        data.activeNoteId = id;
        const note = data.folders.flatMap(f => f.notes).find(n => n.id === id);
        editorEl.innerHTML = note ? note.content : '';
        render();
        updateToolbars();
    }

    function saveCurrentNote() {
        const note = data.folders.flatMap(f => f.notes).find(n => n.id === data.activeNoteId);
        if (note) {
            note.content = editorEl.innerHTML;
            const text = editorEl.innerText.trim().split('\n')[0].substring(0, 25);
            if(text.length > 1) note.title = text;
            save();
            const activeEls = document.querySelectorAll('.note-item.active span');
            activeEls.forEach(el => { if(el.onclick) el.innerText = `📄 ${note.title}`; });
        }
    }

    function addFolder() {
        const name = prompt("Nome da pasta:");
        if(name) { data.folders.push({ name, notes: [], collapsed: false }); activeFolderIndex = data.folders.length - 1; render(); }
    }

    function deleteFolder(e, index) {
        e.stopPropagation();
        if(confirm(`Apagar pasta "${data.folders[index].name}"?`)) {
            data.folders.splice(index, 1);
            if(data.folders.length === 0) data.folders = [{ name: 'Geral', notes: [], collapsed: false }];
            activeFolderIndex = 0;
            render();
        }
    }

    function addNote() {
        const id = Date.now();
        if(!data.folders[activeFolderIndex]) activeFolderIndex = 0;
        data.folders[activeFolderIndex].collapsed = false;
        data.folders[activeFolderIndex].notes.push({ id, title: 'Nova Nota', content: '' });
        loadNote(id);
    }

    function save() { localStorage.setItem('telecom_v7', JSON.stringify(data)); }

    function exportData() {
        const blob = new Blob([JSON.stringify(data)], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `backup_notas_telecom.txt`;
        a.click();
    }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if(imported.folders) { data = imported; render(); loadNote(data.activeNoteId); }
            } catch(err) { alert("Ficheiro inválido."); }
        };
        reader.readAsText(input.files[0]);
    }

    editorEl.addEventListener('keyup', updateToolbars);
    editorEl.addEventListener('mouseup', updateToolbars);
    editorEl.addEventListener('click', updateToolbars);

    render();
    loadNote(data.activeNoteId);

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    window.addEventListener('beforeunload', () => { save(); });
</script>
</body>
</html>
